# =============================================================================
# docker-compose.dokploy.yml
# Orquestación completa del proyecto para despliegue en Dokploy (Compose mode)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # BASE DE DATOS LOCAL (MySQL 8)
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_spanish_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./uni-eval-api/sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - eval-network

  # ---------------------------------------------------------------------------
  # OLLAMA (LLM local)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - eval-network

  ollama-pull:
    image: ollama/ollama:latest
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["sh", "-c", "ollama pull ${LLM_MODEL}"]
    networks:
      - eval-network

  # ---------------------------------------------------------------------------
  # DB INIT — importa app.sql si la BD está vacía (funciona con volumen previo)
  # Corre una sola vez y sale. El backend espera a que termine.
  # ---------------------------------------------------------------------------
  db-init:
    image: mysql:8
    restart: "no"
    environment:
      MYSQL_PWD: ${DB_ROOT_PASSWORD}
    entrypoint:
      - bash
      - -c
      - |
        echo '⏳ Esperando MySQL...'
        until mysqladmin ping -h mysql -uroot --silent 2>/dev/null; do sleep 2; done
        echo '✅ MySQL listo'
        TABLES=$$(mysql -h mysql -uroot -e \
          "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='app';" \
          -sN 2>/dev/null || echo 0)
        if [ "$$TABLES" = "0" ] || [ -z "$$TABLES" ]; then
          echo '📥 BD vacía — importando esquema...'
          mysql -h mysql -uroot < /init/app.sql && echo '✅ Esquema importado.'
        else
          echo "✅ BD ya tiene $$TABLES tablas — omitiendo init."
        fi
    volumes:
      - ./uni-eval-api/sql/init:/init:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eval-network

  # ---------------------------------------------------------------------------
  # BACKEND (uni-eval-api — Express + Prisma)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./uni-eval-api
      dockerfile: Dockerfile
      args:
        CACHEBUST: ${CACHEBUST:-1}
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 5000

      # DB local (contenedor MySQL)
      DATABASE_URL: mysql://root:${DB_ROOT_PASSWORD}@mysql:3306/${DB_NAME}
      DATABASE_URL_METRICAS: mysql://root:${DB_ROOT_PASSWORD}@mysql:3306/app_metricas

      # DBs externas sigedin
      DATABASE_URL_AUTH: ${DATABASE_URL_AUTH}
      DATABASE_URL_USER: ${DATABASE_URL_USER}

      # Auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}

      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}

      # URLs
      API_BASE_URL: ${API_BASE_URL}
      API_SWAGGER_URL: ${API_BASE_URL}

      # IA
      OLLAMA_HOST: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL}

      # Debug
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      VALIDATION_DEBUG: ${VALIDATION_DEBUG:-false}
      SKIP_DB_CHECK: ${SKIP_DB_CHECK:-false}
    ports:
      - "5000:5000"
    networks:
      - eval-network

  # ---------------------------------------------------------------------------
  # FRONTEND (uni-eval-front — Next.js standalone)
  # NEXT_PUBLIC_* se embeben en el build — requiere rebuild si cambian
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./uni-eval-front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_API_TIMEOUT: ${NEXT_PUBLIC_API_TIMEOUT:-30000}
        NEXT_PUBLIC_RETRY_ATTEMPTS: ${NEXT_PUBLIC_RETRY_ATTEMPTS:-3}
        NEXT_PUBLIC_RETRY_DELAY: ${NEXT_PUBLIC_RETRY_DELAY:-1000}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_API_TIMEOUT: ${NEXT_PUBLIC_API_TIMEOUT:-30000}
      NEXT_PUBLIC_RETRY_ATTEMPTS: ${NEXT_PUBLIC_RETRY_ATTEMPTS:-3}
      NEXT_PUBLIC_RETRY_DELAY: ${NEXT_PUBLIC_RETRY_DELAY:-1000}
    ports:
      - "3001:3000"
    networks:
      - eval-network

# =============================================================================
# VOLÚMENES
# =============================================================================
volumes:
  mysql_data:
  ollama_data:

# =============================================================================
# RED
# =============================================================================
networks:
  eval-network:
    driver: bridge
